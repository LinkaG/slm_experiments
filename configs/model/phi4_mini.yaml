name: phi4_mini
model_type: huggingface
model_size: 4B
model_path: microsoft/Phi-4-mini-instruct
max_length: 512
temperature: 0.2  # Низкая температура для фактологических ответов
top_p: 0.95
repetition_penalty: 1.1
max_new_tokens: 50  # Короткие конкретные ответы для фактологических вопросов
device: cuda
use_flash_attention: false  # для V100 и старше использовать eager attention
